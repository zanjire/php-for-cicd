name: Dockerize

on:
  push:
    branches: [ main ]

concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push: # <--- Fixed: Added job definition name
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push multi-architecture image 8.3
        uses: docker/build-push-action@v5 # Updated to v5 for best practices
        with:
          platforms: linux/amd64
          push: true
          tags: uscf/php-docker:8.3
          file: Dockerfile.8.3
          # no-cache is removed to allow layer caching unless strictly needed
`
